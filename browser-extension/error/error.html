<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FetchDock Connector Error</title>
    <link rel="stylesheet" href="../shared/extension.css" />
  </head>
  <body class="page-shell">
    <main class="settings-page error-page">
      <header>
        <div>
          <strong>FetchDock could not receive the page</strong>
          <span>Connector error</span>
        </div>
      </header>
      <p id="message" class="error"></p>
      <section class="diagnostic-card" aria-label="Connector diagnostics">
        <strong>Local connector</strong>
        <dl id="diagnostics"></dl>
      </section>
      <p id="status"></p>
      <div class="actions">
        <button id="retry-bridge" type="button">Retry bridge</button>
        <button id="copy-diagnostics" class="secondary" type="button">Copy diagnostics</button>
        <button id="open-options" class="secondary" type="button">Open settings</button>
      </div>
    </main>
    <script type="module" src="error.js"></script>
  </body>
</html>
